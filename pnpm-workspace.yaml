packages:
  - "packages/*"
  # The dashboard is a Bun app (orbital-js requires Bun) and is managed by its
  # own `bun install`, not pnpm. Exclude it so `pnpm install`/`pnpm -r` ignore it.
  - "!packages/dashboard"
  - "examples/*"
  - "e2e"

allowBuilds:
  esbuild: set this to true or false

# esbuild ships a native binary built via a postinstall script; tsup/tsx/vitest
# all depend on it, so this build must be allowed to run.
onlyBuiltDependencies:
  - esbuild
