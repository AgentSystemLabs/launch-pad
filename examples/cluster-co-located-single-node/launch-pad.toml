# Single-box auto-placement: ALL replicas of the web service on ONE both-role
# node, served by that node's own Caddy — no remote edge, even if the cluster
# has a default edge (co-located deliberately ignores it).
#
#   topology = "co-located"  — pick one both-role node; ingress.edge stays null
#                              so Caddy and the containers share the box.
#   schedule = "capacity"    — of the cluster's both-role nodes, pick the one
#                              with room for ALL replicas (omit for first-node).
#
# Set the cluster up once (both-role nodes run containers AND Caddy):
#   launch-pad cluster create lower --region us-east-1
#   launch-pad node create box-a --cluster lower --role both
#   launch-pad node create box-b --cluster lower --role both
#
# Then deploy into it:
#   launch-pad deploy --cluster lower
#
# DNS: point the domain's A record at the CHOSEN node's Elastic IP — the
# placement panel printed on deploy names it.
project = "example-co-located"

[[service]]
name = "web"
# no node/nodes — deploy picks one both-role node for the whole service
schedule = "capacity"
topology = "co-located"
dockerfile = "../both-node-web-worker/Dockerfile"
context = "../both-node-web-worker"
cpu = 256
memory = 256
replicas = 2
domain = "shop.agentsystem.dev"
port = 3000
env = { NODE_ENV = "production" }

  [service.healthCheck]
  path = "/healthz"

  [service.rollout]
  maxSurge = 1
  drainTimeout = "20s"
  stopGrace = "30s"
