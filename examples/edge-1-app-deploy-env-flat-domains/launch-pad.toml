# Edge router + many environments on the cluster's app node(s) (`--env`).
#
#   the edge node (role: edge) — public 80/443, Caddy only
#   the app node  (role: app)  — isolated footprints per --env, side by side
#
#   launch-pad deploy              → app.agentsystem.dev, api.agentsystem.dev
#   launch-pad deploy --env <name> → projected domains from domainPattern
project = "edge-env"
domainPattern = "{service}-{env}.agentsystem.dev"

[[service]]
name = "api"
dockerfile = "../web-worker/Dockerfile"
context = "../web-worker"
cpu = 256
memory = 256
domain = "api.agentsystem.dev"
port = 3000
env = { NODE_ENV = "production" }
  # --env <name> → api-<name>.agentsystem.dev (project default pattern)
  [service.healthCheck]
  path = "/healthz"

[[service]]
name = "web"
dockerfile = "../web-worker/Dockerfile"
context = "../web-worker"
cpu = 256
memory = 256
domain = "app.agentsystem.dev"
domainPattern = "{env}.agentsystem.dev"
port = 3000
env = { NODE_ENV = "production" }
  # --env <name> → <name>.agentsystem.dev (per-service override)
  [service.healthCheck]
  path = "/healthz"
