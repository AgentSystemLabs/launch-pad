# Dedicated edge router + two app nodes with rolling replicas.
#
#   node-edge    (role: edge)  — public 80/443, runs Caddy, no app containers
#   node-app-a   (role: app)   — private, reachable only by the edge
#   node-app-b   (role: app)   — private, reachable only by the edge
#
# Placement is automatic: the scheduler bin-packs the 4 replicas across both
# app nodes; the edge load-balances app.agentsystem.dev across every healthy
# replica. The TOML names no infrastructure.
project = "example-edge"

[[service]]
name = "web"
dockerfile = "../web-worker/Dockerfile"
context = "../web-worker"
cpu = 256
memory = 256
replicas = 4
domain = "app.agentsystem.dev"
port = 3000
env = { NODE_ENV = "production" }

  [service.healthCheck]
  path = "/healthz"

  [service.rollout]
  maxSurge = 1
  drainTimeout = "20s"
  stopGrace = "30s"
