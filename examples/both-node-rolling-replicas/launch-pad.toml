# Single node, co-located Caddy, 2 replicas with zero-downtime rolling updates.
# Reuses the Express app + Dockerfile from ../both-node-web-worker.
project = "replicas-demo"

[[service]]
name = "web"
node = "solo-1"                          # one node, role "both" (Caddy co-located)
dockerfile = "../both-node-web-worker/Dockerfile"
context = "../both-node-web-worker"
cpu = 256
memory = 256
replicas = 2                            # Caddy round-robin load-balances both replicas
domain = "demo.example.com"
port = 3000
env = { NODE_ENV = "production" }

  [service.healthCheck]
  path = "/healthz"                     # a surged replica must pass this before an old one drains

  [service.rollout]
  maxSurge = 1                          # add one new replica before removing one old
  drainTimeout = "20s"                  # stop routing, then wait for in-flight requests
  stopGrace = "30s"                     # SIGTERM grace before SIGKILL
