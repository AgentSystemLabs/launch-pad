# A worker with a persistent named volume. Its data lives on the node's disk and
# survives a container replacement (a rolling deploy / `deploy --restart`), so SQLite
# files, uploads, and local caches don't reset on every deploy.
#
# Placement is automatic, but a volume-bearing service is STICKY: the scheduler
# picks one app node on the first deploy and keeps the service there afterwards —
# rebalance and evacuate refuse to move it (the data lives on that node's disk).
project = "worker-with-volume"

[[service]]
name = "ledger"
dockerfile = "Dockerfile"
context = "."
cpu = 256
memory = 256
replicas = 1
env = { NODE_ENV = "production" }

  # Mount a persistent volume named "data" at /data inside the container.
  [[service.volumes]]
  name = "data"
  path = "/data"
