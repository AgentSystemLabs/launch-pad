# A "lower" cluster: two app nodes behind ONE edge router, in one AWS account.
#
# Placement is fully automatic — the scheduler bin-packs replicas across the
# cluster's app nodes and routes the domain through the cluster's edge, so the
# app config never mentions infrastructure names.
#
# Set the cluster up once (or skip this — a first `deploy` auto-provisions
# edge-1 + app-1 when the cluster is empty):
#   launch-pad cluster create lower --region us-east-1
#   launch-pad node create edge-lower --cluster lower --role edge
#   launch-pad node create app-a      --cluster lower --edge edge-lower
#   launch-pad node create app-b      --cluster lower --edge edge-lower
#
# Then deploy into it:
#   launch-pad deploy --cluster lower      # or add --cluster to your CI invocation
project = "example-clusters"

[[service]]
name = "web"
# No placement fields exist — the scheduler bin-packs replicas by free
# CPU/memory across the cluster's app nodes (spreading across empty nodes
# when possible; stacking only when necessary) and fronts the domain with
# the cluster's edge node.
dockerfile = "../web-worker/Dockerfile"
context = "../web-worker"
cpu = 256
memory = 256
replicas = 4               # …e.g. 2 on app-a + 2 on app-b
domain = "app.agentsystem.dev"   # …and routes this domain through the cluster's edge
port = 3000
env = { NODE_ENV = "production" }

  [service.healthCheck]
  path = "/healthz"

  [service.rollout]
  maxSurge = 1
  drainTimeout = "20s"
  stopGrace = "30s"
