# Capacity-aware auto-placement of a MULTI-SERVICE footprint: the web service is
# fronted by the cluster's edge node; the worker is packed wherever there's room.
# No infrastructure names in the TOML — placement is fully automatic.
#
#   The scheduler bin-packs by free CPU/memory (spreads across empty nodes
#   when possible; stacks when necessary). Web services always route through
#   the cluster's dedicated edge node; app nodes stay VPC-private behind it.
#
# Set the cluster up once (or let the first deploy auto-provision the nodes):
#   launch-pad cluster create lower --region us-east-1
#   launch-pad node create edge-lower --cluster lower --role edge
#   launch-pad node create app-a      --cluster lower --edge edge-lower
#   launch-pad node create app-b      --cluster lower --edge edge-lower
#
# Then deploy into it:
#   launch-pad deploy --cluster lower
#
# Every deploy prints the resolved placement map (add --json for machine output).
project = "example-capacity"

[[service]]
name = "web"
# no placement fields — deploy bin-packs replicas across the app pool and
# fronts the domain with the cluster's edge
dockerfile = "../web-worker/Dockerfile"
context = "../web-worker"
cpu = 256
memory = 256
replicas = 4
domain = "capacity.agentsystem.dev"
port = 3000
env = { NODE_ENV = "production" }

  [service.healthCheck]
  path = "/healthz"

  [service.rollout]
  maxSurge = 1
  drainTimeout = "20s"
  stopGrace = "30s"

[[service]]
name = "worker"
# a worker has no ingress — deploy packs it onto whichever app node has room
dockerfile = "../web-worker/worker.Dockerfile"
context = "../web-worker"
cpu = 256
memory = 256
replicas = 2
env = { NODE_ENV = "production" }
