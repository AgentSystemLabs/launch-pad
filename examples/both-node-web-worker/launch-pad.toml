# launch-pad project config. Run `npx @agentsystemlabs/launch-pad deploy` from
# this directory. Each [[service]] is built into its own image and placed on the
# named node. A service with a `domain`+`port` is a web service (gets Caddy +
# HTTPS); one without is a background worker.
project = "example-express"

[[service]]
name = "web"
node = "yt-example"
dockerfile = "./Dockerfile"
cpu = 256 # vCPU shares (1024 = 1 vCPU)
memory = 256 # MB
replicas = 2            # Caddy load-balances across both; rolling updates are zero-downtime
domain = "other.agentsystem.dev"
port = 3000
env = { NODE_ENV = "production" }

  [service.healthCheck]
  path = "/healthz"     # a new replica must pass this before the old one is drained

  [service.rollout]
  maxSurge = 1
  drainTimeout = "20s"
  stopGrace = "30s"

[[service]]
name = "worker"
node = "yt-example"
dockerfile = "./worker.Dockerfile"
cpu = 256
memory = 256
env = { NODE_ENV = "production" }
