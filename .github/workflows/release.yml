# Publish @agentsystemlabs/launch-pad to npm via OIDC Trusted Publishing.
#
# No NPM_TOKEN secret is used — npm authenticates this workflow through GitHub's
# OIDC identity. Before the first release, configure the trusted publisher once at
#   https://www.npmjs.com/package/@agentsystemlabs/launch-pad/access
# (or, for the very first publish, see docs/releasing.md for the bootstrap step):
#   Organization or user: AgentSystemLabs
#   Repository:           launch-pad
#   Workflow filename:    release.yml
#   Environment:          (leave blank — this workflow uses none)
#
# Trigger: push a version tag that matches packages/cli/package.json, e.g.
#   git tag v0.1.1 && git push origin v0.1.1
# (the `release` skill / `pnpm` version bump creates this tag for you), or run it
# manually from the Actions tab via workflow_dispatch.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Serialize releases for the same ref; never cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm OIDC Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # action-setup reads the pinned version from the root packageManager field
      # (pnpm@11.1.2). Do NOT pass a `version:` here — it conflicts with that field.
      - uses: pnpm/action-setup@v4

      # Node >= 22.14 is required for npm OIDC trusted publishing; the repo wants >=24.
      # Deliberately NO `registry-url:` — on pnpm 11.1.2 the .npmrc placeholder token it
      # writes (`_authToken=${NODE_AUTH_TOKEN}`) 404s under OIDC. pnpm publishes to the
      # default npm registry and performs the OIDC exchange on its own.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Guard against publishing a version that doesn't match the tag that triggered it.
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match packages/cli version $PKG — bump the package first"
            exit 1
          fi
          echo "publishing @agentsystemlabs/launch-pad@$PKG"

      # Build `shared` so the CLI's vitest run resolves it from node_modules/dist.
      - run: pnpm --filter @agentsystemlabs/launch-pad-shared build

      - run: pnpm --filter @agentsystemlabs/launch-pad typecheck
      - run: pnpm --filter @agentsystemlabs/launch-pad test

      # `prepublishOnly` rebuilds the bundled dist immediately before packing. pnpm
      # rewrites the workspace:* devDependencies to fixed versions and detects the OIDC
      # environment automatically — no token needed. Provenance is attached for free.
      - name: Publish to npm (OIDC)
        run: pnpm --filter @agentsystemlabs/launch-pad publish --no-git-checks --access public
