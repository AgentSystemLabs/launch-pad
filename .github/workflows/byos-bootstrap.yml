name: BYOS Bootstrap Matrix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu:
    name: Ubuntu ${{ matrix.version }}
    runs-on: ubuntu-${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        version: ["22.04", "24.04"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test external bootstrap renderer
        run: pnpm --filter @agentsystemlabs/launch-pad test src/provision/external-bootstrap.test.ts

  amazon-linux-2023:
    name: Amazon Linux 2023
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test external bootstrap renderer in AL2023 container
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            amazonlinux:2023 \
            bash -lc '
              set -euxo pipefail
              dnf install -y curl tar gzip xz git
              curl -fsSL https://rpm.nodesource.com/setup_24.x | bash -
              dnf install -y nodejs
              corepack enable
              corepack prepare pnpm@11.1.2 --activate
              pnpm install --frozen-lockfile
              pnpm --filter @agentsystemlabs/launch-pad test src/provision/external-bootstrap.test.ts
            '
