[package]
name = "launch-pad-agent"
version = "0.0.0"
edition = "2021"
description = "Rust rewrite spike of the Launch Pad node agent (parity port of packages/agent)"
publish = false

[lib]
name = "launch_pad_agent"
path = "src/lib.rs"

[[bin]]
name = "launch-pad-agent"
path = "src/main.rs"

[dependencies]
aws-config = "1.8.18"
aws-sdk-ecr = "1.119.0"
aws-sdk-s3 = "1.135.0"
base64 = "0.22.1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
serde = { version = "1", features = ["derive"] }
# Default features: serde_json::Map is BTreeMap-backed, so object keys serialize
# sorted — this reproduces the TS `canonical()` key-sort used for fingerprints.
serde_json = "1"
sha2 = "0.10"
signal-hook = "0.3"
tokio = { version = "1", features = ["full"] }
ureq = "2"

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
